<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{ subject }}</title>
	</head>
	<body style="margin:0;padding:0;background:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#18181b;">
		<div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{ preview }}</div>
		<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:24px 0;">
			<tr>
				<td align="center">
					<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e4e4e7;">
						<tr>
							<td style="padding:28px 32px 8px;text-align:center;">
								{% if brand.logo %}<img src="{{ brand.logo }}" alt="{{ brand.name }}" height="40" style="height:40px;max-width:180px;object-fit:contain;" />{% else %}<span style="font-size:20px;font-weight:700;letter-spacing:-0.01em;">{{ brand.name }}</span>{% endif %}
							</td>
						</tr>
						<tr>
							<td style="padding:8px 32px 32px;">
								{{ content | safe }}
							</td>
						</tr>
					</table>
					<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">
						<tr>
							<td style="padding:16px 32px;text-align:center;color:#a1a1aa;font-size:12px;line-height:18px;">
								Sent by {{ brand.name }}{% if brand.email %} · {{ brand.email }}{% endif %}<br />
								If you didn't expect this email, you can safely ignore it.
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
