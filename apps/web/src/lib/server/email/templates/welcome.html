<h1 style="margin:8px 0 12px;font-size:20px;font-weight:700;">Welcome to {{ brand.name }}</h1>
<p style="margin:0 0 16px;font-size:14px;line-height:22px;color:#3f3f46;">
	Thanks for joining, {{ name }} — your account is all set.
</p>
<p style="margin:0 0 16px;font-size:14px;line-height:22px;color:#3f3f46;">
	Your address <strong>{{ mailbox }}</strong> is live: mail sent to it lands in
	this inbox, and everything you write goes out from it.
</p>
<p style="margin:0 0 4px;font-size:12px;line-height:18px;color:#a1a1aa;">
	This is the first mail in your new mailbox. Glad to have you.
</p>
