<h1 style="margin:8px 0 12px;font-size:20px;font-weight:700;">Your password reset code</h1>
<p style="margin:0 0 20px;font-size:14px;line-height:22px;color:#3f3f46;">
	Enter this code to reset your {{ brand.name }} password. It expires in 10 minutes.
</p>
<p style="margin:0 0 20px;text-align:center;">
	<span style="display:inline-block;font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;font-size:28px;font-weight:700;letter-spacing:6px;background:#f4f4f5;border:1px solid #e4e4e7;border-radius:10px;padding:14px 24px;">{{ code }}</span>
</p>
<p style="margin:16px 0 0;font-size:12px;line-height:18px;color:#a1a1aa;">
	If you didn't request this, ignore this email — your password stays unchanged.
</p>
